# Alembic configuration file.
# The DATABASE_URL is injected at runtime by env.py from app.core.config.settings,
# so the placeholder below is never used directly — it is overridden in env.py.

[alembic]
script_location = src/msbc/database/migrations
version_locations = src/msbc/database/migrations/versions
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .

# sqlalchemy.url is overridden in env.py; kept here as a fallback placeholder.
sqlalchemy.url = postgresql://user:password@localhost:5432/devagents

[post_write_hooks]
# (empty — add black/isort hooks here if desired)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

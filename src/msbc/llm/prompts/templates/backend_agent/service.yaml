  You are a senior Django developer following MSBC Group coding standards. Generate a complete service file for Django app "{module_name}".

  The file contains TWO classes:
  1. Public <Feature>Service class — all business logic, @transaction.atomic on writes
  2. Private _<Feature>Repository class — ORM-only DB access, always tenant-scoped

  MANDATORY RULES:
  - File: {module_name}/services/{module_name}_service.py
  - Public class: {service_name} (e.g., EnquiryService)
  - Private class: _{feature_name}Repository inside same file — never accessed externally
  - @transaction.atomic on every write method (create, update, delete, status transitions)
  - Every repository method filters by tenant_id — never omit tenant scope
  - Never raw SQL — ORM only (.filter(), .get(), .exclude(), .annotate())
  - Never access DB from service directly — always via self._repo
  - Services raise exceptions (ValueError, ValidationError) — views catch and return HTTP
  - Service returns domain objects — views serialize them
  - require_tenant() guard: if not self._repo.tenant_exists(tenant_id): raise ValueError("Invalid tenant")
  - Use .active() not .all() for live records on AuditedModel tables
  - Imports at top: from django.db import transaction; from django.core.exceptions import ValidationError

  Pattern:
  ```python
  from django.db import transaction
  from django.core.exceptions import ValidationError
  from {module_name}.models.{model_file} import {ModelName}

  class {ServiceName}:
      def __init__(self, repository=None):
          self._repo = repository or _{FeatureName}Repository()

      def list_{feature}(self, tenant_id):
          return self._repo.list_{feature}(tenant_id)

      @transaction.atomic
      def create_{feature}(self, tenant_id, user_id, **data):
          self._require_tenant(tenant_id)
          return self._repo.create_{feature}({**data, 'tenant_id': tenant_id, 'created_by': user_id})

      @transaction.atomic
      def update_{feature}(self, tenant_id, {feature}_id, user_id, **data):
          obj = self._repo.get_{feature}(tenant_id, {feature}_id)
          return self._repo.update_{feature}(obj, {**data, 'updated_by': user_id})

      @transaction.atomic
      def delete_{feature}(self, tenant_id, {feature}_id):
          obj = self._repo.get_{feature}(tenant_id, {feature}_id)
          self._repo.soft_delete_{feature}(obj)

      def _require_tenant(self, tenant_id):
          # Implement tenant existence check via repository
          pass

  class _{FeatureName}Repository:
      def list_{feature}(self, tenant_id):
          return {ModelName}.objects.active().filter(tenant_id=tenant_id)

      def get_{feature}(self, tenant_id, {feature}_id):
          return {ModelName}.objects.active().filter(tenant_id=tenant_id, id={feature}_id).first()

      def create_{feature}(self, data: dict):
          return {ModelName}.objects.create(**data)

      def update_{feature}(self, obj, data: dict):
          for key, value in data.items():
              setattr(obj, key, value)
          obj.save()
          return obj

      def soft_delete_{feature}(self, obj):
          from django.utils import timezone
          obj.deleted_at = timezone.now()
          obj.save()
  ```


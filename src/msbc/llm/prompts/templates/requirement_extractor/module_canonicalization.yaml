# module_canonicalization.yaml
#
# Canonicalization review prompt for module_canonicalizer_node (Phase 1, step 1.4).
#
# Called ONLY when one or more section groups have confidence < 0.75 or when
# multiple standalone-module candidates share suspiciously similar names.
# For high-confidence groups, Python grouping (group_by_canonical_name) is
# used directly without this LLM call.
#
# Input: a JSON array of provisional canonical module groups.
# Output: a corrected array of canonical modules with merge decisions.
#
# Uses CANONICALIZATION_SCHEMA from:
#   src/msbc/agents/schemas/requirement_extractor/section_classification.py
#
# Returns: {"canonical_modules": [...]}
#
# Placeholders:
#   {provisional_modules_json}  — JSON array of provisional module groups
#   {group_count}               — number of groups under review

system: |
  You are an expert requirements analyst.  You will receive a list of
  PROVISIONAL canonical module groups produced by an automated classifier.
  Each group contains one or more document sections that were tentatively
  assigned the same business module name.

  Some groups may be LOW-CONFIDENCE or DUPLICATES that need to be merged,
  split, or re-named.  Your task is to produce a clean, final list of
  canonical modules.

  Each input group contains:
    module_key        — current snake_case slug (may change after review)
    display_name      — current display name
    section_ids       — list of section_ids assigned to this group
    aliases           — original heading texts included in this group
    min_confidence    — lowest classifier confidence in this group
    has_standalone    — whether any section in the group was marked is_standalone_module=true

  YOUR TASK
  ─────────
  For each input group, decide ONE of:

    KEEP    — group is correct as-is.  Copy it through unchanged.
    MERGE   — this group should be merged into another group.
              Set merge_into_key to the module_key it belongs with.
    RENAME  — keep the sections but correct the display_name.
              Set new_display_name to the corrected name.
    SPLIT   — this group was incorrectly merged; split it.
              Provide a split_into list of new groups.
              Each split group must claim a disjoint subset of the section_ids.

  MERGE/RENAME/SPLIT RULES
  ────────────────────────
  1. MERGE when two groups name the same business module:
     e.g. "Material Consumption" and "Material Consumption Against Job" are the
     same module → merge the smaller group into the larger.

  2. RENAME when the display_name is clearly wrong:
     e.g. a group called "Stock Module" (document title) with all its child
     sections → rename to the actual business feature name.

  3. SPLIT when the group contains sections from clearly unrelated modules:
     e.g. "Overview" sections from two different modules ended up together.

  4. Preserve all section_ids — every section_id from the input must appear
     in exactly one output group.

  5. module_key in the output must be a valid snake_case slug (lowercase,
     underscores only, no spaces, no special characters).

  6. display_name must be 2–6 Title Case words, specific to the business feature.

  OUTPUT FORMAT
  ─────────────
  Return ONLY valid JSON.  No markdown fences.  No prose.  No extra keys.

  {
    "canonical_modules": [
      {
        "module_key":    "<snake_case slug>",
        "display_name":  "<2-6 word Title Case name>",
        "section_ids":   ["sec_0001", "sec_0002"],
        "aliases":       ["<original heading text>"],
        "merge_reason":  "<one sentence if MERGE/RENAME/SPLIT; null otherwise>",
        "confidence":    <0.0 – 1.0>
      }
    ]
  }

  CRITICAL:
  • Every section_id from the input must appear in exactly one output group.
  • module_key values must be unique across all output groups.
  • Do NOT invent new section_ids.
  • Return at least 1 canonical module.

user_template: |
  Below are {group_count} provisional module group(s) requiring review.
  Apply the rules from the system prompt and return the corrected canonical modules.

  --- PROVISIONAL GROUPS ---
  {provisional_modules_json}
  --- END ---

  Return valid JSON only.
  Ensure every section_id appears in exactly one output canonical_module.

# Application settings
# Values here are defaults; override via environment variables or .env file.

app:
  name: "DevAgents"
  version: "0.1.0"
  environment: "development"
  debug: true

api:
  host: "0.0.0.0"
  port: 8000
  reload: true
  prefix: "/api/v1"
  cors_origins:
    - "*"

llm:
  model: "gpt-4.1-mini"
  timeout_seconds: 180
  # OPENAI_API_KEY must be set as an environment variable — never hardcode here.

agents:
  max_retries: 3
  retry_base_delay_seconds: 1.0
  schema_validation_retries: 2

logging:
  level: "INFO"
